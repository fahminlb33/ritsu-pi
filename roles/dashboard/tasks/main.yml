---
- name: Create config directory
  ansible.builtin.file:
    path: "{{ dashboard_config_dir }}"
    state: directory
    mode: "0775"
  register: dashboard_config_dir_reg

- name: Create Dashboard configuration
  ansible.builtin.template:
    src: templates/settings.yml.j2
    dest: "{{ dashboard_config_dir_reg.path }}/settings.yml"
    mode: "0755"

- name: Pull image from registry
  community.docker.docker_image:
    state: "{{ dashboard_state }}"
    name: "{{ dashboard_image }}"
    source: pull

- name: Start and connect container to network
  community.docker.docker_container:
    name: dashboard
    image: "{{ dashboard_image }}"
    restart_policy: unless-stopped
    ports:
      - "{{ dashboard_port }}:3000"
    networks:
      - name: ritsu-pi
    volumes:
      - "{{ dashboard_config_dir_reg.path }}:/app/config:rw"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    env:
      PUID: "1000"
      PGID: "1000"
      HOMEPAGE_ALLOWED_HOSTS: "{{ server_domain }},dashboard:3000"
    state: "{{ 'started' if dashboard_state == 'present' else 'absent' }}"
